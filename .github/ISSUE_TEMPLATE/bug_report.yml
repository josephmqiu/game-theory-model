name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: Version
      description: App version (check `package.json`, the packaged app version, or the macOS native About panel if applicable)
      placeholder: e.g. 0.3.2
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Electron)
        - Windows (Electron)
        - Linux (Electron)
        - Renderer dev server (development only)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of what the bug is.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Open the editor
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: If applicable, add screenshots or screen recordings.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context — OS version, logs, CLI/runtime details, or browser version for renderer-dev-only issues.
