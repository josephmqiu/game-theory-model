name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run shared/game-theory/engine/ shared/game-theory/compute/ shared/game-theory/types/

      - name: Build web
        run: bun --bun vite build
