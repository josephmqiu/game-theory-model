name: CI

on:
  push:
    branches: [main, v0.0.1]
  pull_request:
    branches: [main, v0.0.1]

jobs:
  branch-confidence:
    name: Branch Confidence
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run branch-confidence gate
        run: bun run check:pr

  smoke-server:
    name: Smoke Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: branch-confidence

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare smoke artifacts
        run: bun run test:smoke:prepare

      - name: Run SSE smoke test
        run: bun run smoke-tests/sse.ts

      - name: Run MCP smoke test
        run: bun run smoke-tests/mcp.ts
