appId: dev.game-theory-analyzer.app
productName: Game Theory Analyzer
copyright: Copyright (c) 2024-2026 Game Theory Analyzer contributors

directories:
  output: dist-electron
  buildResources: build

files:
  - electron-dist/**/*
  - "!node_modules"

afterPack: scripts/electron-builder-after-pack.cjs

extraResources:
  - from: .output/server
    to: server
  - from: .output/public
    to: public
  - from: dist/mcp-stdio-proxy.cjs
    to: mcp-stdio-proxy.cjs

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  artifactName: "${productName}-${version}-${arch}-mac.${ext}"
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true

dmg:
  title: "${productName} ${version}"

win:
  icon: build/icon.ico
  artifactName: "${productName}-${version}-${arch}-win.${ext}"
  target:
    - nsis
    - portable

nsis:
  artifactName: "${productName}-${version}-${arch}-win-setup.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: build/icon.png
  category: Office
  artifactName: "${productName}-${version}-${arch}-linux.${ext}"
  desktop:
    entry: |
      [Desktop Entry]
      Name=Game Theory Analyzer
      Exec=AppRun --no-sandbox %U
      Terminal=false
      Type=Application
      Icon=game-theory-analyzer
      StartupWMClass=game-theory-analyzer
      Categories=Graphics;
      MimeType=application/x-game-theory-analysis;
  target:
    - AppImage
    - deb

fileAssociations:
  - ext: gta
    name: Game Theory Analyzer File
    description: Game Theory Analyzer Analysis File
    mimeType: application/x-game-theory-analysis
    role: Editor
    icon: build/icon

asar: true
