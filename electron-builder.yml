appId: dev.gametheory.app
productName: Game Theory Analyzer
copyright: Copyright (c) 2026

directories:
  output: dist-electron
  buildResources: build

files:
  - electron-dist/**/*
  - "!node_modules"

extraResources:
  - from: .output/server
    to: server
  - from: .output/public
    to: public
  - from: dist/mcp-server.cjs
    to: mcp-server.cjs

mac:
  category: public.app-category.productivity
  icon: build/icon.icns
  artifactName: "${productName}-${version}-${arch}-mac.${ext}"
  target:
    - dmg
    - zip
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  title: "${productName} ${version}"

win:
  icon: build/icon.ico
  artifactName: "${productName}-${version}-${arch}-win.${ext}"
  target:
    - nsis
    - portable

nsis:
  artifactName: "${productName}-${version}-${arch}-win-setup.${ext}"
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  icon: build/icon.png
  category: Science
  artifactName: "${productName}-${version}-${arch}-linux.${ext}"
  target:
    - AppImage
    - deb

fileAssociations:
  - ext: gta.json
    name: Game Theory Analysis
    description: Game Theory Analysis File
    mimeType: application/x-game-theory-analysis
    role: Editor

asar: true
